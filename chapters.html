<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chapters | Karma and Concepts</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="chapters.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- NAVBAR -->
<div id="navbar-container"></div>

<!-- CONTENT -->
<div class="resources-container">
  <h1 id="pageTitle">Chapters</h1>
  <ul id="chapterList"></ul>
</div>

<script type="module">

/* FIREBASE */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAl45OqZNLnZfyg61GLYQx18s7wTXEYHZg",
  authDomain: "karmconcepts.firebaseapp.com",
  projectId: "karmconcepts",
  storageBucket: "karmconcepts.appspot.com",
  messagingSenderId: "627618765063",
  appId: "1:627618765063:web:dae9cb992f5aec2c8e4da2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* AUTH */
let currentUser = null;
let isAuthReady = false;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
  isAuthReady = true;
});

/* NAVBAR LOAD */
fetch("navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar-container").innerHTML = data;
  });

/* PROTECTED LINKS */
document.addEventListener("click", function(e){
  const link = e.target.closest(".protectedLink");
  if(!link) return;

  e.preventDefault();

  if(!isAuthReady){
    alert("Please wait...");
    return;
  }

  if(currentUser){
    window.location.href = link.dataset.page;
  } else {
    window.location.href = "register.html";
  }
});

/* SUBJECT */
const urlSubject = new URLSearchParams(window.location.search).get("subject");

const subjectMap = {
  "9science": "Class 9 Science Handwritten Notes",
  "9maths": "Class 9 Maths Handwritten Notes",
  "9socialscience": "Class 9 Social Science Handwritten Notes",

  "10science": "Class 10 Science Handwritten Notes",
  "10maths": "Class 10 Maths Handwritten Notes",
  "10socialscience": "Class 10 Social Science Handwritten Notes",

  "11physics": "Class 11 Physics Handwritten Notes",
  "11chemistry": "Class 11 Chemistry Handwritten Notes",
  "11biology": "Class 11 Biology Handwritten Notes",

  "12physics": "Class 12 Physics Handwritten Notes",
  "12chemistry": "Class 12 Chemistry Handwritten Notes",
  "12biology": "Class 12 Biology Handwritten Notes"
};

const matchedKey = subjectMap[urlSubject?.toLowerCase()] 
  || "Class 9 Science Handwritten Notes";

document.getElementById("pageTitle").textContent =
  `Chapterwise Notes for ${matchedKey}`;

/* DATA */
const chaptersData = {
  "Class 9 Science Handwritten Notes": [
    "Motion",
    "Force & Laws of Motion",
    "Work, Energy & Simple Machines"
  ]
};

/* LIST RENDER */
const list = document.getElementById("chapterList");

if (!chaptersData[matchedKey]) {
  list.innerHTML = "<li>No chapters available</li>";
} else {

  chaptersData[matchedKey].forEach((ch, index) => {

    const li = document.createElement("li");

    li.innerHTML = `
      ${ch}
      <a href="viewer.html?pdf=sample.pdf">Click Here</a>
    `;

    list.appendChild(li);

  });

}

</script>

</body>
</html>
