<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chapters | Karma and Concepts</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<body>

<!-- 🔥 NAVBAR -->
<div id="navbar-container"></div>

<!-- ===== CONTENT ===== -->
<div class="resources-container">
  <h1 id="pageTitle">Chapters</h1>
  <ul id="chapterList"></ul>
</div>

<!-- ===== NAVBAR LOAD ===== -->
<script>
fetch("navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar-container").innerHTML = data;
  });
</script>

<!-- ===== PDF CONFIG ===== -->
<script>
const PDF_CONFIG = {
  "9science": { class: "9", code: "sci", folder: "9scinotes" },
  "9maths": { class: "9", code: "math", folder: "9mathnotes" },
  "9socialscience": { class: "9", code: "sst", folder: "9sstnotes" },

  "10science": { class: "10", code: "sci", folder: "10scinotes" },
  "10maths": { class: "10", code: "math", folder: "10mathnotes" },
  "10socialscience": { class: "10", code: "sst", folder: "10sstnotes" },

  "11physics": { class: "11", code: "phy", folder: "11phynotes" },
  "11chemistry": { class: "11", code: "chem", folder: "11chemnotes" },
  "11biology": { class: "11", code: "bio", folder: "11bionotes" },

  "12physics": { class: "12", code: "phy", folder: "12phynotes" },
  "12chemistry": { class: "12", code: "chem", folder: "12chemnotes" },
  "12biology": { class: "12", code: "bio", folder: "12bionotes" }
};

function getPDFPath(subjectKey, index) {
  const data = PDF_CONFIG[subjectKey];
  if (!data) return "#";
  return `${data.folder}/${data.class}${data.code}ch${index + 1}.pdf`;
}
</script>

<!-- ===== CHAPTER SCRIPT ===== -->
<script>

const urlSubject = new URLSearchParams(window.location.search).get("subject");

const subjectMap = {
  "9science": "Class 9 Science Handwritten Notes",
  "9maths": "Class 9 Maths Handwritten Notes",
  "9socialscience": "Class 9 Social Science Handwritten Notes",

  "10science": "Class 10 Science Handwritten Notes",
  "10maths": "Class 10 Maths Handwritten Notes",
  "10socialscience": "Class 10 Social Science Handwritten Notes",

  "11physics": "Class 11 Physics Handwritten Notes",
  "11chemistry": "Class 11 Chemistry Handwritten Notes",
  "11biology": "Class 11 Biology Handwritten Notes",

  "12physics": "Class 12 Physics Handwritten Notes",
  "12chemistry": "Class 12 Chemistry Handwritten Notes",
  "12biology": "Class 12 Biology Handwritten Notes"
};

// fallback safe
let matchedKey = subjectMap[urlSubject?.toLowerCase()] || "Class 9 Science Handwritten Notes";

document.getElementById("pageTitle").textContent = `Chapterwise Notes for ${matchedKey}`;

// 🔥 minimal demo data (expand later)
const chaptersData = {
  "Class 9 Science Handwritten Notes": ["Motion","Force & Laws of Motion"],
  "Class 10 Maths Handwritten Notes": ["Real Numbers","Polynomials"],
  "Class 11 Physics Handwritten Notes": ["Units and Measurements","Motion in a Straight Line"],
  "Class 12 Biology Handwritten Notes": ["Human Reproduction","Evolution"]
};

const list = document.getElementById("chapterList");

// ✅ safe check (important)
if (!chaptersData[matchedKey]) {
  list.innerHTML = "<li>No chapters available</li>";
} else {

  chaptersData[matchedKey].forEach((ch, index) => {

    const li = document.createElement("li");

    const parts = matchedKey.split(" ");
    const classNum = parts[1];
    const subjectName = parts[2];
    const subjectKey = classNum + subjectName.toLowerCase();

    const pdfFile = getPDFPath(subjectKey, index);

    li.innerHTML = `
      ${ch} -
      <a href="viewer.html?pdf=${encodeURIComponent(pdfFile)}">
        Click Here
      </a>
    `;

    list.appendChild(li);

  });
}

</script>

<!-- ===== FIREBASE ===== -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAl45OqZNLnZfyg61GLYQx18s7wTXEYHZg",
  authDomain: "karmconcepts.firebaseapp.com",
  projectId: "karmconcepts",
  storageBucket: "karmconcepts.appspot.com",
  messagingSenderId: "627618765063",
  appId: "1:627618765063:web:dae9cb992f5aec2c8e4da2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
});

// 🔥 navbar load hone ke baad hi bind karo
setTimeout(() => {
  document.querySelectorAll(".protectedLink").forEach(link => {
    link.addEventListener("click", (e) => {
      e.preventDefault();

      if (currentUser) {
        window.location.href = link.dataset.page;
      } else {
        window.location.href = "register.html";
      }
    });
  });
}, 500);

</script>

</body>
</html>
