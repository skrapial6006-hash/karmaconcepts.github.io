<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Courses | Karma and Concepts</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="courses.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- 🔥 NAVBAR -->
<div id="navbar-container"></div>

<!-- ===== CONTENT ===== -->
<div class="courses-container">

<h1 class="courses-title">Courses</h1>

<p class="course-note">
  You can check the "Live Courses" Section when these courses will go live!
</p>

<div class="card slide-right">
  <div class="overlay">COMING SOON</div>
  <div class="card-content">
    <h2>Organic Course</h2>
  </div>
</div>

</div>

<!-- 🔥 NAVBAR LOAD -->
<script>
fetch("navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar-container").innerHTML = data;

    // ✅ SAFE CALL
    if (window.initAuth) {
      window.initAuth();
    }
  })
  .catch(err => console.error("Navbar load error:", err));
</script>

<!-- 🔥 FIREBASE + AUTH -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAl45OqZNLnZfyg61GLYQx18s7wTXEYHZg",
  authDomain: "karmconcepts.firebaseapp.com",
  projectId: "karmconcepts",
  storageBucket: "karmconcepts.appspot.com",
  messagingSenderId: "627618765063",
  appId: "1:627618765063:web:dae9cb992f5aec2c8e4da2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 GLOBAL FUNCTION (IMPORTANT FIX)
window.initAuth = function () {

  let currentUser = null;

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
  });

  // ✅ EVENT DELEGATION
  document.addEventListener("click", function(e){
    const link = e.target.closest(".protectedLink");
    if(!link) return;

    e.preventDefault();

    if(currentUser){
      window.location.href = link.dataset.page;
    } else {
      window.location.href = "register.html";
    }
  });

};

</script>

</body>
</html>
