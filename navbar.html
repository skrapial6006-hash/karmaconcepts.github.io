<!-- ===== NAVBAR CSS ===== -->
<style>

/* ===== NAVBAR WRAPPER (SCOPED) ===== */
.nav-wrapper {
  width: 100%;
}

/* ===== HERO ===== */
.nav-wrapper .common-hero {
  height: 180px;
  background: linear-gradient(120deg, #156066 0%, #187A6F 45%, #2BBF7A 95%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ===== TITLE ===== */
.nav-wrapper .site-title {
  font-family: 'Cinzel', serif;
  color: white;
  font-size: 32px;
  margin-bottom: 20px;
}

/* ===== NAVBAR ===== */
.nav-wrapper .navbar {
  display: flex;
  gap: 40px;
  justify-content: center;
  align-items: center;
  width: 100%;
}

.nav-wrapper .navbar a {
  color: white;
  text-decoration: none;
  font-family: 'Cinzel', serif;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
}

/* ===== DROPDOWN ===== */
.nav-wrapper .dropdown {
  position: relative;
}

.nav-wrapper .dropdown-menu {
  position: absolute;
  top: 100%;
  left: 0;
  background: #E8F5E9;
  width: 260px;
  border-radius: 6px;
  padding: 10px 0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);

  opacity: 0;
  visibility: hidden;
  transform: translateY(10px);
  transition: all 0.3s ease;
}

.nav-wrapper .dropdown:hover .dropdown-menu {
  opacity: 1;
  visibility: visible;
  transform: translateY(0);
}

.nav-wrapper .dropdown-menu a {
  display: block;
  color: black;
  padding: 8px 16px;
  font-size: 13px;
}

/* ===== SUBMENU ===== */
.nav-wrapper .submenu {
  position: relative;
}

.nav-wrapper .submenu-menu {
  position: absolute;
  top: 0;
  left: 100%;
  background: #E8F5E9;
  width: 200px;
  border-radius: 6px;
  padding: 10px 0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);

  opacity: 0;
  visibility: hidden;
  transform: translateX(10px);
  transition: all 0.3s ease;
}

.nav-wrapper .submenu:hover .submenu-menu {
  opacity: 1;
  visibility: visible;
  transform: translateX(0);
}

/* ===== HOVER ===== */
.nav-wrapper a:hover {
  opacity: 0.8;
}

</style>
</head>

<body>

<!-- ===== NAVBAR START ===== -->
<div class="nav-wrapper">

<!-- ===== NAVBAR JS ===== -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAl45OqZNLnZfyg61GLYQx18s7wTXEYHZg",
  authDomain: "karmconcepts.firebaseapp.com",
  projectId: "karmconcepts",
  storageBucket: "karmconcepts.appspot.com",
  messagingSenderId: "627618765063",
  appId: "1:627618765063:web:dae9cb992f5aec2c8e4da2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
});

document.querySelectorAll(".protectedLink").forEach(link => {
  link.addEventListener("click", (e) => {
    e.preventDefault();

    if (currentUser) {
      window.location.href = link.dataset.page;
    } else {
      window.location.href = "register.html";
    }
  });
});

</script>
