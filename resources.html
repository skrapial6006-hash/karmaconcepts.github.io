<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Study Resources | Karma and Concepts</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="resources.css">
</head>

<body>

<!-- 🔥 NAVBAR -->
<div id="navbar-container"></div>

<!-- ===== CONTENT ===== -->
<div class="resources-container">

  <h1>Study Resources</h1>
  <p class="note">Get Topper's handwritten notes at our site by clicking the links below!</p>

  <!-- (same content — untouched) -->

</div>

<!-- 🔥 NAVBAR LOAD -->
<script>
fetch("navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar-container").innerHTML = data;

    // ✅ Navbar load hone ke baad auth init
    initAuth();
  })
  .catch(err => console.error("Navbar load error:", err));
</script>

<!-- 🔥 FIREBASE + AUTH -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAl45OqZNLnZfyg61GLYQx18s7wTXEYHZg",
  authDomain: "karmconcepts.firebaseapp.com",
  projectId: "karmconcepts",
  storageBucket: "karmconcepts.appspot.com",
  messagingSenderId: "627618765063",
  appId: "1:627618765063:web:dae9cb992f5aec2c8e4da2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔥 CLEAN AUTH SYSTEM (NO GLOBAL, NO DUPLICATE)
function initAuth() {

  let currentUser = null;

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
  });

  // ✅ EVENT DELEGATION (BEST METHOD)
  document.addEventListener("click", function(e){
    const link = e.target.closest(".protectedLink");
    if(!link) return;

    e.preventDefault();

    if(currentUser){
      window.location.href = link.dataset.page;
    } else {
      window.location.href = "register.html";
    }
  });

}

</script>

</body>
</html>
