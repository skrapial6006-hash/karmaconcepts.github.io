<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Viewer | Karma and Concepts</title>

<link rel="stylesheet" href="viewer.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>

<!-- ✅ NAVBAR -->
<div id="navbar-container"></div>

<!-- ===== VIEWER ===== -->
<div class="viewer-container">
  <div class="notes-card">

    <button class="arrow" id="prev">&#10094;</button>
    <canvas id="pdfCanvas"></canvas>
    <button class="arrow" id="next">&#10095;</button>

    <!-- 🔒 Overlay -->
    <div class="overlay" id="overlay">
      <h2>
        Get whole <span id="subjectName"></span> notes PDF  
        for class <span id="classStd"></span>  
        for just Rs.99/-
      </h2>

      <button id="payBtn" class="buy-btn">Click to Proceed</button>
    </div>

  </div>
</div>

<!-- ===== NAVBAR LOAD (FIXED) ===== -->
<script>
fetch("navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar-container").innerHTML = data;

    // ✅ wait for auth function safely
    if (window.initAuth) {
      window.initAuth();
    } else {
      document.addEventListener("authReady", () => window.initAuth());
    }
  });
</script>

<!-- ===== LIBRARIES ===== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<!-- ===== PDF SCRIPT ===== -->
<script>

const params = new URLSearchParams(window.location.search);

const pdfFile = params.get("pdf");
const subject = params.get("subject") || "Subject";
const classStd = params.get("class") || "";

if(!pdfFile){
  alert("PDF file missing!");
  throw new Error("No PDF path");
}

document.getElementById("subjectName").textContent = subject;
document.getElementById("classStd").textContent = classStd;

let freePages = 3;
let pdfDoc = null;
let pageNum = 1;

const canvas = document.getElementById("pdfCanvas");
const ctx = canvas.getContext("2d");
const card = document.querySelector(".notes-card");

/* 🔐 Paid check */
function isPaidUser(){
  return localStorage.getItem(pdfFile) === "paid";
}

/* Watermark */
const watermark = new Image();
watermark.src = "images/logo2.png";

/* ===== PDF LOAD ===== */
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";

pdfjsLib.getDocument({ url: pdfFile }).promise
.then(pdf => {
  pdfDoc = pdf;
  renderPage(pageNum);
})
.catch(() => {
  document.body.innerHTML = "<h2 style='text-align:center'>PDF Load Failed ❌</h2>";
});

/* ===== RENDER ===== */
function renderPage(num){

  if(num > freePages && !isPaidUser()){
    overlay.style.display="flex";
    card.classList.add("blur");
  }else{
    overlay.style.display="none";
    card.classList.remove("blur");
  }

  pdfDoc.getPage(num).then(page => {

    const viewport = page.getViewport({scale:1.5});
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise.then(() => {

      const w = canvas.width * 0.18;
      const h = w * (watermark.height / watermark.width);

      ctx.globalAlpha = 0.15;

      ctx.drawImage(watermark,
        canvas.width/2 - w/2,
        canvas.height/2 - h/2,
        w,h
      );

      ctx.globalAlpha = 1;
    });

  });

}

/* ===== NAVIGATION ===== */
next.onclick = () => {
  if(pageNum < pdfDoc.numPages){
    pageNum++;
    renderPage(pageNum);
  }
};

prev.onclick = () => {
  if(pageNum > 1){
    pageNum--;
    renderPage(pageNum);
  }
};

/* ===== PAYMENT ===== */
payBtn.onclick = function(){

  var options = {
    key: "rzp_test_ScXkkjBHd3KyZV",
    amount: 9900,
    currency: "INR",
    name: "Karma and Concepts",
    description: "Full Notes Access",

    handler: function (){
      alert("Payment Successful ✅");
      localStorage.setItem(pdfFile, "paid");
      renderPage(pageNum);
    }
  };

  new Razorpay(options).open();
};

/* ===== BASIC PROTECTION ===== */
document.addEventListener("contextmenu", e => e.preventDefault());

document.onkeydown = function(e){
  if(e.keyCode == 123){
    return false;
  }
};

</script>

<!-- ===== FIREBASE AUTH (FIXED) ===== -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAl45OqZNLnZfyg61GLYQx18s7wTXEYHZg",
  authDomain: "karmconcepts.firebaseapp.com",
  projectId: "karmconcepts",
  storageBucket: "karmconcepts.appspot.com",
  messagingSenderId: "627618765063",
  appId: "1:627618765063:web:dae9cb992f5aec2c8e4da2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ✅ GLOBAL AUTH FUNCTION (SAFE + CLEAN) */
window.initAuth = function() {

  let currentUser = null;

  onAuthStateChanged(auth, (user) => {
    currentUser = user;

    // ✅ REMOVE OLD EVENTS
    document.querySelectorAll(".protectedLink").forEach(link => {
      const newLink = link.cloneNode(true);
      link.replaceWith(newLink);
    });

    // ✅ ADD NEW EVENTS
    document.querySelectorAll(".protectedLink").forEach(link => {
      link.addEventListener("click", (e) => {
        e.preventDefault();

        if (currentUser) {
          window.location.href = link.dataset.page;
        } else {
          window.location.href = "register.html";
        }
      });
    });

  });

  // 🔥 notify navbar loader
  document.dispatchEvent(new Event("authReady"));
};

</script>

</body>
</html>
