<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Viewer | Karma and Concepts</title>

<link rel="stylesheet" href="viewer.css">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>

<div class="viewer-container">
  <div class="notes-card">

    <button class="arrow" id="prev">&#10094;</button>

    <canvas id="pdfCanvas"></canvas>

    <button class="arrow" id="next">&#10095;</button>

    <!-- 🔒 Overlay -->
    <div class="overlay" id="overlay">
      <h2>
        Get whole <span id="subjectName"></span> notes PDF  
        for class <span id="classStd"></span>  
        for just Rs.99/-
      </h2>

      <button id="payBtn" class="buy-btn">Click to Proceed</button>
    </div>

  </div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>

/* ================= PARAMS ================= */
const params = new URLSearchParams(window.location.search);

const pdfFile = params.get("pdf");
const subject = params.get("subject") || "Subject";
const classStd = params.get("class") || "";

const subjectKey = (classStd + "th " + subject)
  .toUpperCase()
  .trim();

if(!pdfFile){
  alert("PDF file missing!");
  throw new Error("No PDF path");
}

document.getElementById("subjectName").textContent = subject;
document.getElementById("classStd").textContent = classStd;

/* ================= VARIABLES ================= */
let freePages = 3;
let pdfDoc = null;
let pageNum = 1;

const canvas = document.getElementById("pdfCanvas");
const ctx = canvas.getContext("2d");
const card = document.querySelector(".notes-card");

/* 🔐 Subject-wise lock */
function isPaidUser(){
  return localStorage.getItem(pdfFile) === "paid";
}

/* ================= WATERMARK ================= */
// const watermark = new Image();
// watermark.src = "images/logo2.png";

/* ================= PDF LOAD ================= */
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js";
pdfjsLib.getDocument({
  url: pdfFile
}).promise
.then(function(pdf){
  pdfDoc = pdf;
  renderPage(pageNum);
})
.catch(function(error){
  console.error("PDF LOAD ERROR:", error);

  document.body.innerHTML = `
    <h2 style="text-align:center;margin-top:50px;">
      PDF Load Failed ❌<br>
      Check file path or folder name
    </h2>
  `;
});

/* ================= RENDER ================= */
function renderPage(num){

  /* 🔒 LOCK LOGIC */
  if(num > freePages && !isPaidUser()){
    document.getElementById("overlay").style.display="flex";
    card.classList.add("blur");
  }else{
    document.getElementById("overlay").style.display="none";
    card.classList.remove("blur");
  }

  pdfDoc.getPage(num).then(function(page){

    const viewport = page.getViewport({scale:1.5});

    canvas.height = viewport.height;
    canvas.width = viewport.width;

    page.render({
      canvasContext: ctx,
      viewport: viewport
    }).promise.then(function(){

const w = canvas.width * 0.18;
const h = w * (watermark.height / watermark.width);

ctx.globalAlpha = 0.18;

const positions = [
  [canvas.width/2 - w/2, canvas.height/2 - h/2],
  [30,30],
  [canvas.width - w - 30,30],
  [30,canvas.height - h - 30],
  [canvas.width - w - 30,canvas.height - h - 30]
];

positions.forEach(pos=>{
  ctx.drawImage(watermark,pos[0],pos[1],w,h);
});

ctx.globalAlpha = 1;

    });

  });

}

/* ================= NAVIGATION ================= */
document.getElementById("next").onclick = function(){
  if(pageNum < pdfDoc.numPages){
    pageNum++;
    renderPage(pageNum);
  }
};

document.getElementById("prev").onclick = function(){
  if(pageNum > 1){
    pageNum--;
    renderPage(pageNum);
  }
};

/* ================= PAYMENT ================= */
document.getElementById("payBtn").onclick = function(){

  var options = {
    key: "rzp_test_ScXkkjBHd3KyZV",
    amount: 9900,
    currency: "INR",
    name: "Karma and Concepts",
    description: "Full Notes Access",

handler: function (){

  alert("Payment Successful ✅");

  const folderLink = driveFolders[subjectKey];

  if(folderLink){
    localStorage.setItem(pdfFile, "paid"); renderPage(pageNum);
  }else{
    alert("Folder link not found ❌");
    console.log("Generated key:", subjectKey);
  }

},
    theme: {
      color: "#156066"
    }
  };

  new Razorpay(options).open();
};

/* ================= BASIC PROTECTION ================= */

/* Right click disable */
document.addEventListener("contextmenu", e => e.preventDefault());

/* F12 disable */
document.onkeydown = function(e){
  if(e.keyCode == 123){
    return false;
  }
};

const driveFolders = {
  "9TH SCIENCE": "https://drive.google.com/drive/folders/1RfyyD3-Gs7qKh2CRaYpqBFaYc6JkzeHD?usp=sharing",
  "9TH MATHS": "https://drive.google.com/drive/folders/1JDMRPYD4KLyqPG5q8_NObnGTPzAF1AZq?usp=sharing",
  "9TH SOCIAL SCIENCE": "https://drive.google.com/drive/folders/1OlwV8QlICsAYKGb2ckB1mbJdytcjH0zy?usp=sharing",
  "10TH SCIENCE": "https://drive.google.com/drive/folders/1RdhV2RLh_-Ow7Onvhg49u7OSrQ7MZd7M?usp=sharing",
  "10TH MATHS": "https://drive.google.com/drive/folders/1rqng1MpS8ZY9qtggwRB-sbWtw0k1eLFx?usp=sharing",
  "10TH SOCIAL SCIENCE": "https://drive.google.com/drive/folders/13jA9Xq0VcinMYlVuUQRgxfvHttVqpfV_?usp=sharing",
  "11TH PHYSICS": "https://drive.google.com/drive/folders/1YkpTNQXVP7bGSEZosymush7pft1XjHIX?usp=sharing",
  "11TH CHEMISTRY": "https://drive.google.com/drive/folders/1gevaNeAtofvNAn9jYRfOVsTO_HEVg4Pi?usp=sharing",
  "11TH BIOLOGY": "https://drive.google.com/drive/folders/1y47q-yYNao5bQni9Gj5uBuYjIiVNa6f5?usp=sharing",
  "12TH PHYSICS": "https://drive.google.com/drive/folders/1UPXrSb8r_MBF11KdMnnC0JkFNp3F0dXC?usp=sharing",
  "12TH CHEMISTRY": "https://drive.google.com/drive/folders/1MZvtWCRlJSQM9_Dvun1qsOZFFlAsH9F7?usp=sharing",
  "12TH BIOLOGY": "https://drive.google.com/drive/folders/1_WiP46WXD98YIoX6aHnvFYpoHA_oHVlf?usp=sharing"

};

</script>

</body>
</html>
