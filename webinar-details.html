<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Webinar Details | Karma and Concepts</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="webinar-details.css">

</head>

<body>

<!-- ✅ NAVBAR LOAD -->
<div id="navbar-container"></div>


<!-- ===== DETAIL CARD ===== -->
<div class="detail-container">
  <h1 id="title"></h1>
  <p id="description"></p>
  <a href="webinarr.html" class="main-btn">Register Now</a>
</div>


<!-- ===== NAVBAR FETCH ===== -->
<script>
fetch("navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar-container").innerHTML = data;
    initAuth(); // 🔥 IMPORTANT
  });
</script>


<!-- ===== WEBINAR DATA SCRIPT ===== -->
<script>

const webinarData = {

chemistry:{
title:"Chemistry Concept Mapping – 3 Days Webinar",
description:"Join our exclusive 3-day Chemistry webinar designed to simplify concepts and boost your confidence for exams..."
},

physics:{
title:"Physics Concept Mapping – 3 Days Webinar",
description:"Join our exclusive 3-day Physics webinar designed to make complex concepts simple..."
},

biology:{
title:"Biology Concept Mapping – 3 Days Webinar",
description:"Join our exclusive 3-day Biology webinar designed to make learning easy..."
},

geeta:{
title:"Understanding the Teachings of Bhagwad Geeta – 3 Days Programme",
description:"Join our exclusive 3-day webinar on understanding the teachings of the Bhagavad Gita..."
},

self:{
title:"Knowing Yourself for Future Pathways – 3 Days Programme",
description:"Join our exclusive 3-day webinar on knowing yourself..."
},

communication:{
title:"How to Communicate Effectively & Effortlessly – 3 Days Programme",
description:"Join our exclusive 3-day webinar on communication..."
},

study:{
title:"Effective Study Management – 3 Days Programme",
description:"Join our exclusive 3-day webinar on managing tasks..."
},

personality:{
title:"Build a Strong & Effective Personality – 3 Days Programme",
description:"Join our exclusive 3-day webinar on personality development..."
}

};

const params = new URLSearchParams(window.location.search);
const webinarName = params.get("webinar");

const webinar = webinarData[webinarName];

if(webinar){
  document.getElementById("title").textContent = webinar.title;
  document.getElementById("description").textContent = webinar.description;
} else {
  document.getElementById("title").textContent = "Webinar Not Found";
  document.getElementById("description").textContent = "";
}

</script>


<!-- ===== FIREBASE AUTH (FIXED) ===== -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAl45OqZNLnZfyg61GLYQx18s7wTXEYHZg",
  authDomain: "karmconcepts.firebaseapp.com",
  projectId: "karmconcepts",
  storageBucket: "karmconcepts.appspot.com",
  messagingSenderId: "627618765063",
  appId: "1:627618765063:web:dae9cb992f5aec2c8e4da2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 🔥 GLOBAL FUNCTION */
window.initAuth = function () {

  let currentUser = null;

  onAuthStateChanged(auth, (user) => {
    currentUser = user;

    document.querySelectorAll(".protectedLink").forEach(link => {
      link.addEventListener("click", (e) => {
        e.preventDefault();

        if (currentUser) {
          window.location.href = link.dataset.page;
        } else {
          window.location.href = "register.html";
        }
      });
    });

  });

};

</script>

</body>
</html>
